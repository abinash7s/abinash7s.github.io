<script src="https://d3js.org/d3.v4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/venn.js@0.2.20/venn.min.js"></script>

<script>

var sets = [

{sets: ['Physics'], size:10},
{sets: ['Machine Learning'], size:10},
{sets: ['Quantum'], size:10},

{sets:['Physics','Machine Learning'], size:5},
{sets:['Physics','Quantum'], size:3},
{sets:['Machine Learning','Quantum'], size:4},

{sets:['Physics','Machine Learning','Quantum'], size:2}

];

var chart = venn.VennDiagram();

var div = d3.select("#venn");

div.datum(sets).call(chart);

</script>
